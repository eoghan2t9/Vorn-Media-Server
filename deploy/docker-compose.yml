services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vorn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vorn}
      POSTGRES_DB: ${POSTGRES_DB:-vorn}
    volumes:
      - vorn_postgres_data:/var/lib/postgresql/data
    # No host port published: only the backend container needs to reach
    # Postgres, over the internal compose network (service name "postgres").
    # Uncomment if you want host-side psql access, adjusting the host port
    # if 5432 is already taken there:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vorn}"]
      interval: 5s
      timeout: 5s
      retries: 10

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    restart: unless-stopped
    ulimits:
      memlock: -1
    # No host port published (same reasoning as postgres above, and it also
    # avoids colliding with any other Redis-protocol service already using
    # 6379 on the host). Uncomment to expose it directly:
    # ports:
    #   - "6379:6379"
    volumes:
      - vorn_dragonfly_data:/data

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_started
    environment:
      VORN_HTTP_ADDR: ":8080"
      VORN_POSTGRES_DSN: "postgres://${POSTGRES_USER:-vorn}:${POSTGRES_PASSWORD:-vorn}@postgres:5432/${POSTGRES_DB:-vorn}?sslmode=disable"
      VORN_DRAGONFLY_ADDR: "dragonfly:6379"
      # Must match the origin the browser actually loads the frontend from
      # (see VORN_API_BASE below, on the frontend service) -- CORS requires
      # an exact match for credentialed (cookie-based) requests.
      VORN_CORS_ORIGIN: "${VORN_FRONTEND_ORIGIN:-http://localhost:5173}"
      VORN_TORRENT_ENABLED: "${VORN_TORRENT_ENABLED:-false}"
      VORN_TORRENT_DOWNLOAD_DIR: "/downloads"
      VORN_NZB_ENABLED: "${VORN_NZB_ENABLED:-false}"
      VORN_NZB_DOWNLOAD_DIR: "/nzb-downloads"
      VORN_OPENSUBTITLES_API_KEY: "${VORN_OPENSUBTITLES_API_KEY:-}"
      VORN_OPENSUBTITLES_USERNAME: "${VORN_OPENSUBTITLES_USERNAME:-}"
      VORN_OPENSUBTITLES_PASSWORD: "${VORN_OPENSUBTITLES_PASSWORD:-}"
      VORN_SUBTITLES_CACHE_DIR: "/subtitles-cache"
      VORN_ARTWORK_CACHE_DIR: "/artwork-cache"
      VORN_BACKUP_DIR: "/backups"
    ports:
      - "8080:8080"
      - "${VORN_TORRENT_PEER_PORT:-42069}:42069/tcp"
      - "${VORN_TORRENT_PEER_PORT:-42069}:42069/udp"
      # If you enable custom-domain SSL via Admin > Network, uncomment these
      # (and consider removing the 8080 mapping above, since certmagic takes
      # over serving on 80/443 instead):
      # - "80:80"
      # - "443:443"
    volumes:
      - ${VORN_LIBRARY_PATH:-./data/library}:/media:ro
      - ${VORN_TORRENT_DOWNLOAD_PATH:-./data/downloads}:/downloads
      - ${VORN_NZB_DOWNLOAD_PATH:-./data/nzb-downloads}:/nzb-downloads
      - ${VORN_SUBTITLES_CACHE_PATH:-./data/subtitles-cache}:/subtitles-cache
      - ${VORN_ARTWORK_CACHE_PATH:-./data/artwork-cache}:/artwork-cache
      - ${VORN_BACKUP_PATH:-./data/backups}:/backups
    # --- GPU passthrough (uncomment the block matching your hardware) ---
    #
    # Nvidia (requires the NVIDIA Container Toolkit on the host):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    #
    # Intel QuickSync / AMD VAAPI (Linux render nodes):
    # devices:
    #   - /dev/dri:/dev/dri

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Override with the address your browser will actually reach the
      # backend at (e.g. a server's public IP/domain) if it's not the same
      # machine you're browsing from.
      VITE_VORN_API_BASE: "${VORN_API_BASE:-http://localhost:8080}"
    ports:
      - "5173:5173"

volumes:
  vorn_postgres_data:
  vorn_dragonfly_data:
